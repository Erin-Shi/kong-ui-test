name: Cypress Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write
  pages: write

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    # Ensure TERM is set so programs that call `tput` don't fail in non-interactive shells
    env:
      TERM: xterm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Pin Node to 18.16.0 to avoid issues with deprecated --loader flag in newer Node versions
          node-version: '18.16.0'

      - name: Install dependencies (allow legacy peer deps)
        run: |
          # Some projects include dependencies with peerDependency constraints incompatible with
          # the environment. Enable legacy-peer-deps to make installs permissive and use the
          # lockfile for deterministic installs.
          npm config set legacy-peer-deps true
          npm ci

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Install docker-compose (binary)
        run: |
          sudo mkdir -p /usr/local/lib/docker/cli-plugins
          sudo curl -L "https://github.com/docker/compose/releases/download/v2.17.3/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/lib/docker/cli-plugins/docker-compose
          sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
          docker compose version

      - name: Start application via docker compose
        run: |
          docker compose -f docker-compose.yaml up -d --build

      - name: Wait for application to be ready
        # Simple wait ˇŞ adjust healthcheck/waiting logic as needed for your app
        run: |
          echo "Waiting for app to be ready..."
          for i in {1..30}; do
            if curl -sSf http://localhost:8002/default/ >/dev/null; then
              echo "App is up"
              exit 0
            fi
            echo "Waiting... ($i)"
            sleep 2
          done
          echo "Timed out waiting for app";
          exit 1

      - name: Run Cypress tests (JUnit + Allure)
        run: |
          echo "Running Cypress and saving full output to cypress_run_ci.log"
          npm run cypress:run:ci > cypress_run_ci.log 2>&1 || true
          ec=$?
          echo ">>> CYPRESS EXIT CODE: $ec"
          echo ">>> LAST 200 LINES OF OUTPUT:"
          tail -n 200 cypress_run_ci.log || true
          echo ">>> tput lines:"
          grep -i "tput" cypress_run_ci.log || true
          echo ">>> allowCypressEnv lines:"
          grep -i "allowCypressEnv" cypress_run_ci.log || true
          # preserve exit code for the job
          exit $ec

      - name: Prepare Allure results and generate report
        run: |
          if [ -d "allure-results" ]; then
            echo "Preparing Allure results and generating report"
            # Ensure Java runtime available for Allure and tools to extract tarball
            sudo apt-get update
            sudo apt-get install -y openjdk-11-jre-headless curl tar unzip

            # Create a cleaned results directory that contains only JSON files expected by Allure
            FILTERED_DIR=./allure-results-filtered
            rm -rf "$FILTERED_DIR"
            mkdir -p "$FILTERED_DIR"

            # Copy only JSON files (container-*.json, *-result.json, executor.json, history*, attachments)
            shopt -s nullglob || true
            for f in allure-results/*.json; do
              cp "$f" "$FILTERED_DIR/"
            done
            # Also copy attachments directory if present
            if [ -d "allure-results/attachments" ]; then
              mkdir -p "$FILTERED_DIR/attachments"
              cp -r allure-results/attachments/* "$FILTERED_DIR/attachments/" || true
            fi

            echo "Filtered files:" && ls -la "$FILTERED_DIR" || true

            # Run cleanup script to remove any unsupported top-level properties like _generatedBy
            if [ -f "scripts/cleanAllureResults.js" ]; then
              echo "Cleaning filtered results with scripts/cleanAllureResults.js"
              node scripts/cleanAllureResults.js "$FILTERED_DIR"
            else
              echo "No cleanAllureResults.js found, skipping JSON cleanup"
            fi

            # Download Allure binary and run generator on filtered dir
            ALLURE_VERSION=2.13.9
            ARCHIVE_URL="https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz"
            mkdir -p /opt/allure
            curl -sSL ${ARCHIVE_URL} -o /tmp/allure.tgz
            tar -xzf /tmp/allure.tgz -C /opt/allure --strip-components=1
            export PATH="/opt/allure/bin:$PATH"

            echo "Allure version: $(/opt/allure/bin/allure --version)"
            /opt/allure/bin/allure generate "$FILTERED_DIR" -o ./allure-report --clean || true

            # Debug output: list generated report files and timestamps
            echo "=== DEBUG: Generated allure-report files ==="
            ls -laR ./allure-report || true
            if [ -f "allure-report/index.html" ]; then
              echo "--- top of allure-report/index.html ---"
              sed -n '1,200p' allure-report/index.html || true
              echo "--- end ---"
            fi
            echo "=== DEBUG: Filtered JSON files ==="
            ls -la "$FILTERED_DIR" || true
            echo "=== DEBUG: File timestamps in allure-report ==="
            find ./allure-report -type f -printf '%TY-%Tm-%Td %TH:%TM:%TS %p\n' | sort || true
          else
            echo "No allure-results directory found, skipping report generation"
          fi

      - name: Deploy Allure report to GitHub Pages
        # Deploy the generated Allure HTML report to gh-pages and preserve history
        # Copies current `allure-report` into `reports/${{ github.run_number }}` on the gh-pages branch
        if: always()
        run: |
          set -e
          if [ -d "allure-report" ]; then
            echo "Deploying allure-report to gh-pages/reports/${{ github.run_number }}"
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            GIT_URL="https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
            TMP_DIR=$(mktemp -d)
            # Try to clone only gh-pages; if it doesn't exist, clone default branch and create gh-pages
            if git ls-remote --exit-code --heads "$GIT_URL" gh-pages >/dev/null 2>&1; then
              git clone --branch gh-pages --single-branch "$GIT_URL" "$TMP_DIR"
            else
              git clone "$GIT_URL" "$TMP_DIR"
              cd "$TMP_DIR"
              git checkout --orphan gh-pages
              git rm -rf . || true
              git commit --allow-empty -m "Initialize gh-pages" || true
              git push "$GIT_URL" gh-pages || true
              cd - >/dev/null
              git clone --branch gh-pages --single-branch "$GIT_URL" "$TMP_DIR"
            fi
            cd "$TMP_DIR"
            mkdir -p reports
            TARGET_DIR="reports/${{ github.run_number }}"
            rm -rf "$TARGET_DIR"
            mkdir -p "$TARGET_DIR"
            # Copy all files (including hidden) from generated report into target directory
            cp -a "$GITHUB_WORKSPACE/allure-report/." "$TARGET_DIR/" || true

            # Generate a simple index.html listing all report subfolders
            echo "<!doctype html><html><head><meta charset='utf-8'><title>Allure Reports</title></head><body><h1>Allure Reports</h1><ul>" > index.html
            # List reports sorted by name (numeric run_number) descending so newest first
            for d in $(ls -1v reports | tac); do
              if [ -d "reports/$d" ]; then
                echo "<li><a href=\"reports/$d/\">Run $d</a></li>" >> index.html
              fi
            done
            echo "</ul></body></html>" >> index.html

            git add -A
            # Commit only if there are changes
            if [ -n "$(git status --porcelain)" ]; then
              git commit -m "Add allure report for run ${{ github.run_number }} (run id ${{ github.run_id }})" || true
              git push "$GIT_URL" gh-pages
            else
              echo "No changes to commit"
            fi
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Upload JUnit test result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-junit-results
          path: results/**/*.xml

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Upload Cypress run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-run-log
          path: cypress_run_ci.log

      - name: Upload Allure raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Comment on PR if tests failed
        if: ${{ failure() && github.event_name == 'pull_request' }}
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request.number;
            const pagesUrl = `https://${owner}.github.io/${repo}/`;
            const body = `Cypress tests failed in this run.\n\n- JUnit results artifact: see workflow artifacts.\n- Allure report: ${pagesUrl}\n\nPlease open the Actions run for details.`;
            await github.rest.issues.createComment({ owner, repo, issue_number: pr, body });
